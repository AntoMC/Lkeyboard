<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mi app web</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /> -->
</head>

<body>
    <header id="main-header">
    <div class="header-top">
        <button id="btn-menu" class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1>Huasmín App</h1>
        <div style="width: 40px;"></div> </div>

    <div class="caja-filtro">
        <div class="fila-principal">
            <input type="text" id="busqueda" placeholder="Buscar cliente o suministro...">
            <select id="filtro">
                <option value="Todos">Localidad</option>
                </select>
        </div>
    </div>
</header>

<div id="menu-lateral" class="menu-oculto">
    <div class="menu-contenido">
        <div class="menu-header">
            <h3>Opciones</h3>
            <button id="btn-cerrar-menu">&times;</button>
        </div>
        <div class="botones-acciones-vertical">
            <button id="btnOffline" class="btn-menu-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Ver Visitas
            </button>
            <button id="limpiarFiltros" class="btn-menu-item" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Ir al Inicio
            </button>
            <button onclick="enviarReporteWhatsApp()" class="btn-whatsapp btn-menu-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                Enviar Reporte
            </button>
            <hr>
            <button id="btnReset" class="btn-reset btn-menu-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                Reiniciar Datos
            </button>
        </div>
    </div>
</div>

    <div id="info"></div>
    <div id="contenedor_cards" class="grid-cards"></div>

    <div id="banner-confirmacion" class="banner-oculto">
        <div class="banner-contenido">
            <p id="banner-mensaje">¿Confirmar visita para este cliente?</p>
            <div class="banner-botones">
                <button id="btn-cancelar" class="btn-secundario">Cancelar</button>
                <button id="btn-confirmar" class="btn-primario">Sí, Confirmar</button>
            </div>
        </div>
    </div>

    <!-- <script src="main.js" type="module"> </script> -->
    <script src="app.js" type="module"> </script>
</body>

</html>
