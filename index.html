<body>

        <button id="limpiarFiltros" disabled>limpiar filtros</button>

    <div id="info">

    </div>
    <table>
        <thead>
            <tr>
                <th>Suministro</th>
                <th>Nombre Completo</th>
                <th>Distrito</th>
                <th>Localidad</th>
                <th>DNI</th>

        </thead>
        <tbody id="tabla_productos"></tbody>

    </table>
